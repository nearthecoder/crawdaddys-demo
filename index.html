<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Nails & Spa Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #0d0d0d; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 16px; }
  .header { text-align: center; padding: 24px; background: rgba(255,255,255,.04); border-radius: 20px; border: 1px solid rgba(212,175,55,.2); }
  .header h1 { color: #d4af37; font-size: 24px; font-weight: 800; letter-spacing: 2px; }
  .header p { color: rgba(255,255,255,.45); font-size: 13px; margin-top: 6px; }
  .chat-box { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 20px; padding: 20px; min-height: 300px; max-height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.6; }
  .msg.bot { background: rgba(212,175,55,.12); border: 1px solid rgba(212,175,55,.2); color: rgba(255,255,255,.9); align-self: flex-start; }
  .msg.user { background: rgba(255,255,255,.09); color: rgba(255,255,255,.85); align-self: flex-end; }
  .input-row { display: flex; gap: 10px; }
  input { flex: 1; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 50px; padding: 14px 20px; font-family: 'Nunito', sans-serif; font-size: 15px; color: #fff; outline: none; caret-color: #d4af37; }
  input::placeholder { color: rgba(255,255,255,.22); }
  button { background: #d4af37; border: none; border-radius: 50px; padding: 14px 22px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; color: #000; cursor: pointer; transition: opacity 300ms; }
  button:hover { opacity: .85; }
  button:disabled { opacity: .35; cursor: not-allowed; }
  .dots { display: flex; gap: 6px; align-items: center; padding: 12px 16px; }
  .dots span { width: 7px; height: 7px; background: #d4af37; border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Happy Nails & Spa</h1>
    <p>Ask me about services, hours, booking, or anything else</p>
  </div>
  <div class="chat-box" id="chat">
    <div class="msg bot">Hi! Welcome to Happy Nails & Spa. I can help you with services, pricing, hours, or booking. What can I help you with?</div>
  </div>
  <div class="input-row">
    <input type="text" id="input" placeholder="Ask something..." />
    <button id="send">Send</button>
  </div>
</div>
<script>
const SYSTEM = `You are the friendly AI assistant for Happy Nails & Spa in Cookeville, Tennessee. You answer questions warmly and helpfully.

Key facts:
- Name: Happy Nails & Spa Cookeville TN
- Address: 433 S Jefferson Ave, Cookeville, TN 38501
- Phone: (931) 349-2666
- Website: happynailsandspacookeville.com
- Hours: Monday-Saturday open, closes 7 PM. Sunday hours may vary.
- Rating: 4.6 stars with over 813 reviews
- Services: Manicures, pedicures, acrylic nails, nail art, spa services, massages
- Vibe: Calm, relaxing, attentive staff. Family friendly — they welcome kids too.
- Owner: Andy runs the team, known for matching inspo pictures perfectly
- Booking: Available on their website

Keep answers short, warm, and helpful. If unsure about specific pricing, direct them to call or visit the website to book.`;

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const send = document.getElementById('send');
const history = [];

async function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  send.disabled = true;

  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.textContent = msg;
  chat.appendChild(userDiv);

  const loadDiv = document.createElement('div');
  loadDiv.className = 'dots';
  loadDiv.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(loadDiv);
  chat.scrollTop = chat.scrollHeight;

  history.push({ role: 'user', content: msg });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content[0].text;
    history.push({ role: 'assistant', content: reply });
    loadDiv.remove();
    const botDiv = document.createElement('div');
    botDiv.className = 'msg bot';
    botDiv.textContent = reply;
    chat.appendChild(botDiv);
  } catch(e) {
    loadDiv.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'msg bot';
    errDiv.textContent = 'Sorry, something went wrong. Please try again.';
    chat.appendChild(errDiv);
  }

  send.disabled = false;
  chat.scrollTop = chat.scrollHeight;
}

send.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
