<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crawdaddy's Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #1a0a00; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 16px; }
  .header { text-align: center; padding: 24px; background: rgba(255,255,255,.05); border-radius: 20px; border: 1px solid rgba(255,255,255,.1); }
  .header h1 { color: #ff6b2b; font-size: 28px; font-weight: 800; letter-spacing: 2px; }
  .header p { color: rgba(255,255,255,.5); font-size: 13px; margin-top: 6px; }
  .chat-box { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; padding: 20px; min-height: 300px; max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.6; }
  .msg.bot { background: rgba(255,107,43,.15); border: 1px solid rgba(255,107,43,.2); color: rgba(255,255,255,.9); align-self: flex-start; }
  .msg.user { background: rgba(255,255,255,.1); color: rgba(255,255,255,.85); align-self: flex-end; }
  .input-row { display: flex; gap: 10px; }
  input { flex: 1; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); border-radius: 50px; padding: 14px 20px; font-family: 'Nunito', sans-serif; font-size: 15px; color: #fff; outline: none; caret-color: #ff6b2b; }
  input::placeholder { color: rgba(255,255,255,.25); }
  button { background: #ff6b2b; border: none; border-radius: 50px; padding: 14px 22px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; color: #fff; cursor: pointer; transition: opacity 300ms; }
  button:hover { opacity: .85; }
  button:disabled { opacity: .35; cursor: not-allowed; }
  .dots { display: flex; gap: 6px; align-items: center; padding: 12px 16px; }
  .dots span { width: 7px; height: 7px; background: #ff6b2b; border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Crawdaddy's</h1>
    <p>Ask me anything about our menu, hours, or location</p>
  </div>
  <div class="chat-box" id="chat">
    <div class="msg bot">Hey! Welcome to Crawdaddy's. Ask me about our menu, hours, location, or anything else. I'm here to help.</div>
  </div>
  <div class="input-row">
    <input type="text" id="input" placeholder="Ask something..." />
    <button id="send">Send</button>
  </div>
</div>
<script>
const SYSTEM = `You are the friendly AI assistant for Crawdaddy's restaurant in Cookeville, Tennessee. You know everything about the restaurant and answer questions helpfully and warmly.

Key facts:
- Name: Crawdaddy's
- Address: 53 W Broad St, Cookeville, TN 38501
- Phone: (931) 526-4660
- Hours: Open daily, closes at 10 PM
- Price range: $20-30 per person
- Style: New Orleans-inspired Southern cuisine, laid-back atmosphere, 2 levels of outdoor seating, full bar
- Popular dishes: Pesto Goat Cheese Dip, Bread Pudding, Crab Cakes, Fried Green Tomatoes, Jambalaya, Penne, Oysters, Creme Brulee, Chilaquiles, Spinach Dip
- Options: Dine-in, curbside pickup, delivery
- Website: crawdaddysgrill.com
- Vibe: Casual, fun, great music, seafood-forward with steaks and pasta too
- Rating: 4.5 stars with nearly 3000 reviews

Keep answers short, friendly, and helpful. If you don't know something specific, direct them to call or visit the website.`;

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const send = document.getElementById('send');
const history = [];

async function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  send.disabled = true;

  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.textContent = msg;
  chat.appendChild(userDiv);

  const loadDiv = document.createElement('div');
  loadDiv.className = 'dots';
  loadDiv.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(loadDiv);
  chat.scrollTop = chat.scrollHeight;

  history.push({ role: 'user', content: msg });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content[0].text;
    history.push({ role: 'assistant', content: reply });
    loadDiv.remove();
    const botDiv = document.createElement('div');
    botDiv.className = 'msg bot';
    botDiv.textContent = reply;
    chat.appendChild(botDiv);
  } catch(e) {
    loadDiv.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'msg bot';
    errDiv.textContent = 'Sorry, something went wrong. Please try again.';
    chat.appendChild(errDiv);
  }

  send.disabled = false;
  chat.scrollTop = chat.scrollHeight;
}

send.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
